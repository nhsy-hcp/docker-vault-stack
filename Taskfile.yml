# https://taskfile.dev
version: '3'

dotenv:
  - .env

vars:
  CONTAINER_RUNTIME: docker

includes:
  authentik:
    taskfile: ./labs/authentik/Taskfile.yml
    dir: ./labs/authentik

tasks:
  default:
    cmds:
      - task --list

  all:
    cmds:
      - task: up
      - task: unseal

  runtime:
    cmds:
      - |
        echo "Using container runtime: {{ .CONTAINER_RUNTIME }}"

  up:
    preconditions:
      - test -f .env
      - test -f docker-compose.yml
    cmds:
      - |
        {{ .CONTAINER_RUNTIME }} compose up -d --pull=missing
        sleep 5
        echo "Alloy: http://localhost:12345"
        echo "Grafana: http://localhost:3000"
        echo "Prometheus: http://localhost:9090"
        echo "Vault: http://localhost:8200"
    silent: true

  vault-up:
    preconditions:
      - test -f .env
      - test -f docker-compose.yml
    cmds:
      - |
        {{ .CONTAINER_RUNTIME }} compose up vault -d --pull=missing
        sleep 5
        echo "Vault: https://localhost:8200"
    silent: true

  restart:
    cmds:
      - |
        {{ .CONTAINER_RUNTIME }} compose restart vault

  status:
    cmds:
      - vault status

  init:
    cmds:
      - ./scripts/10_vault_init.sh {{.CLI_ARGS}}

  unseal:
    cmds:
      - |
        ./scripts/20_vault_unseal.sh

  backup:
    cmds:
      - mkdir -p backups
      - vault operator raft snapshot save ./backups/backup-`date +"%Y%m%d-%H%M"`.snap

  down:
    aliases: ["clean"]
    prompt: This will stop the stack and permanently remove Docker volumes, including Vault data. Continue?
    cmds:
      - |
        {{ .CONTAINER_RUNTIME }} compose down -v
    ignore_error: true
    vars:
      STACK_NAME:
        sh: basename "`pwd`"

  benchmark:
    cmds:
      - vault namespace create vault-benchmark || true
      - vault-benchmark run -config=./benchmark/config.hcl

  metrics:
    cmds:
      - |
        curl -sk --header "X-Vault-Token: $VAULT_TOKEN" "$VAULT_ADDR/v1/sys/metrics?format=prometheus"

  logs-vault:
    cmds:
      - |
        {{ .CONTAINER_RUNTIME }} compose logs -f --tail=100 vault

  logs:
    cmds:
      - |
        {{ .CONTAINER_RUNTIME }} compose logs -f

  stop:
    cmds:
      - |
        {{ .CONTAINER_RUNTIME }} compose stop

  agent-up:
    dir: ./tfc-agent
    preconditions:
      - test -f .env
      - test -f docker-compose.yml
    cmds:
      - |
        {{ .CONTAINER_RUNTIME }} compose up -d --pull=missing

  agent-down:
    dir: ./tfc-agent
    preconditions:
      - test -f .env
      - test -f docker-compose.yml
    cmds:
      - |
        {{ .CONTAINER_RUNTIME }} compose stop

  ui:
    cmds:
      - open http://vault.localhost:8200
      - ./scripts/00_vault_vars.sh
      - |
        echo "Alloy: http://alloy.localhost:12345"
        echo "Authentik: http://authentik.localhost:9000"
        echo "Grafana: http://grafana.localhost:3000"
        echo "Prometheus: http://prometheus.localhost:9090"
        echo "Vault: http://vault.localhost:8200"

        echo "Authentik End Session: http://authentik.localhost:9000/application/o/vault/end-session/"

  token:
    cmds:
      - |
        # copy vault token to clipboard on macos if available
        if [ "$(uname)" = "Darwin" ] && [ -n "$VAULT_TOKEN" ]; then
          echo "$VAULT_TOKEN" | pbcopy
          echo "Vault token copied to clipboard"
        elif [ "$(uname)" = "Darwin" ] && [ -z "$VAULT_TOKEN" ]; then
          echo "note: VAULT_TOKEN not set (run 'task vault:init' first)"
        fi
    silent: true

  pull:
    cmds:
      - |
        {{ .CONTAINER_RUNTIME }} compose pull
    silent: true

  dev:
    preconditions:
      - test -f .env
    cmds:
      - |
        {{ .CONTAINER_RUNTIME }} run --rm -p 8200:8200 --cap-add=IPC_LOCK -e VAULT_LICENSE=$VAULT_LICENSE hashicorp/vault-enterprise:latest server -dev -dev-root-token-id=root -dev-listen-address="0.0.0.0:8200"
    silent: true


  config:
    cmds:
      - |
        export VAULT_TOKEN=$(cat vault-init.json | jq -r '.root_token')
        # {{ .CONTAINER_RUNTIME }} compose exec vault chown vault:vault /vault/logs
        ./scripts/30_vault_config.sh
        {{ .CONTAINER_RUNTIME }} compose restart alloy
        {{ .CONTAINER_RUNTIME }} compose restart prometheus


  shell:
    cmds:
      - |
        {{ .CONTAINER_RUNTIME }} exec -it {{.STACK_NAME }}_vault /bin/sh
    vars:
      STACK_NAME:
        sh: basename "`pwd`"


  vault-restart:
    cmds:
      - |
        {{ .CONTAINER_RUNTIME }} compose restart vault

  tokens:
    desc: List all token accessors with details
    cmds:
      - |
        echo "=== Token Accessors ==="
        vault list auth/token/accessors
        echo ""
        echo "=== Token Details ==="
        for accessor in $(vault list -format=json auth/token/accessors | jq -r '.[]'); do
          echo "--- Accessor: $accessor ---"
          vault token lookup -accessor $accessor || echo "Token not found or expired"
          echo ""
        done

  license:
    cmd: vault read -format=json /sys/license/status | jq '.data'


  lint:
    desc: Run pre-commit hooks on all files
    cmds:
      - pre-commit run --all-files
