---
version: '3'

vars:
  COMPOSE_FILE: ../../docker-compose.yml

tasks:
  all:
    desc: Complete setup workflow (setup-admin + init + apply)
    cmds:
      - ./setup-admin.sh
      - task: init
      - task: apply

  logs:
    desc: View logs from all services
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} logs -f authentik-postgres authentik authentik-worker

  logs-server:
    desc: View Authentik server logs
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} logs -f authentik

  logs-worker:
    desc: View Authentik worker logs
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} logs -f authentik-worker

  logs-postgres:
    desc: View PostgreSQL logs
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} logs -f authentik-postgres

  redeploy:
    desc: Stop Authentik services, remove volumes, and restart
    prompt: This will delete all Authentik data and restart services. Continue?
    cmds:
      - echo "Stopping Authentik services..."
      - docker compose -f {{.COMPOSE_FILE}} stop authentik-postgres authentik authentik-worker
      - echo "Removing volumes..."
      - docker compose -f {{.COMPOSE_FILE}} down -v authentik-postgres authentik authentik-worker
      - echo "Starting Authentik services..."
      - docker compose -f {{.COMPOSE_FILE}} up -d authentik-postgres authentik authentik-worker
      - echo "Authentik redeployed successfully"
      - echo "Access Authentik at http://authentik.localhost:9000"

  restart:
    desc: Restart Authentik stack
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} restart authentik-postgres authentik authentik-worker

  status:
    desc: Show status of all services
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} ps authentik-postgres authentik authentik-worker

  init:
    desc: Initialize Terraform
    dir: .
    cmds:
      - terraform init

  plan:
    desc: Run Terraform plan
    dir: .
    cmds:
      - |
        source .env
        terraform plan

  apply:
    desc: Apply Terraform configuration
    dir: .
    cmds:
      - |
        source .env
        terraform apply -auto-approve

  destroy:
    desc: Destroy Terraform resources
    dir: .
    prompt: This will destroy all Terraform-managed resources. Continue?
    cmds:
      - terraform destroy -auto-approve

  purge:
    desc: Remove Terraform state and disable Vault OIDC auth
    dir: .
    silent: true
    prompt: This will remove Terraform state and disable Vault OIDC auth. Continue?
    cmds:
      - echo "Removing Terraform state resources..."
      - terraform state rm vault_identity_group.vault_admin_external || true
      - terraform state rm vault_identity_group_alias.vault_admin_external || true
      - terraform state rm vault_jwt_auth_backend.root || true
      - terraform state rm vault_jwt_auth_backend_role.root || true
      - terraform state rm vault_policy.admin || true
      - terraform state rm vault_policy.tn001_team1_reader || true
      - terraform state rm vault_policy.tn001_team2_reader || true
      - terraform state rm vault_policy.tn001_ui || true
      - echo "Disabling Vault OIDC auth..."
      - |
        source ../../.env
        vault auth disable oidc || echo "OIDC auth already disabled or not found"
        vault delete identity/group/name/authentik-vault-admin-external || echo "Identity group already deleted or not found"
      - echo "Purge completed"

  test-auth:
    desc: Test OIDC authentication
    cmds:
      - ./demo-auth.sh

  check-policies:
    desc: Check current token policies
    cmds:
      - ./check-policies.sh

  bootstrap:
    desc: Complete setup from scratch (requires Authentik services running via main stack)
    cmds:
      - echo "Ensure Authentik services are running - task up"
      - echo "Waiting for Authentik to be ready..."
      - sleep 30
      - echo "Access Authentik at http://authentik.localhost:9000"
      - echo "1. Login with admin credentials"
      - echo "2. Generate API token - Admin Interface > Tokens > Create"
      - echo "3. Copy token to .env as AUTHENTIK_TOKEN"
      - echo "4. Run - task authentik init && task authentik apply"

  health:
    desc: Check health of all services
    silent: true
    cmds:
      - |
        echo "=== Authentik Health Check ==="
        echo ""
        echo "PostgreSQL:"
        if docker compose -f {{.COMPOSE_FILE}} exec authentik-postgres pg_isready -U authentik > /dev/null 2>&1; then
          echo "  ✓ PostgreSQL is ready"
        else
          echo "  ✗ PostgreSQL is not ready"
        fi
        echo ""
        echo "Authentik Server:"
        if curl -sf http://authentik.localhost:9000/-/health/live/ > /dev/null 2>&1; then
          echo "  ✓ Authentik is healthy"
          echo "  URL: http://authentik.localhost:9000"
        else
          echo "  ✗ Authentik is not ready"
        fi
        echo ""
        echo "Container Status:"
        docker compose -f {{.COMPOSE_FILE}} ps authentik-postgres authentik authentik-worker
